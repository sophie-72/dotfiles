# Auto-generated Helix Theme via Matugen

"ui.background" = { fg = "foreground", bg = "background" }
"ui.background.separator" = { bg = "background" }

"ui.cursor" = { fg = "background", bg = "accent_primary" }
"ui.cursor.match" = { fg = "foreground", bg = "selection" }
"ui.cursor.primary" = { fg = "background", bg = "muted" }

"ui.linenr" = { fg = "muted" }
"ui.linenr.selected" = { fg = "foreground" }

"ui.bufferline" = { fg = "muted", bg = "background" }
"ui.bufferline.active" = { fg = "foreground", bg = "surface" }
"ui.statusline" = { fg = "subtle", bg = "surface" }
"ui.statusline.inactive" = { fg = "muted", bg = "surface" }

# Mode Indicators mapping to context blocks
"ui.statusline.normal" = { fg = "accent_primary", bg = "mode_normal" }
"ui.statusline.insert" = { fg = "accent_secondary", bg = "mode_insert" }
"ui.statusline.select" = { fg = "accent_tertiary", bg = "mode_select" }

"ui.popup" = { fg = "foreground", bg = "surface" }
"ui.picker.header" = { fg = "accent_tertiary", modifiers = ["bold"] }
"ui.window" = { fg = "surface", bg = "background" }
"ui.help" = { fg = "subtle", bg = "surface" }

"ui.text" = { fg = "foreground" }
"ui.text.focus" = { bg = "surface" }
"ui.text.info" = { fg = "subtle" }

"ui.virtual.jump-label" = { fg = "error", modifiers = ["bold"] }
"ui.virtual.ruler" = { bg = "surface" }
"ui.virtual.whitespace" = { fg = "accent_primary" }
"ui.virtual.indent-guide" = { fg = "muted" }
"ui.virtual.inlay-hint" = { fg = "subtle" }

"ui.menu" = { fg = "subtle", bg = "surface" }
"ui.menu.selected" = { fg = "foreground", bg = "surface" }
"ui.menu.scroll" = { fg = "muted", bg = "selection" }

"ui.selection" = { bg = "surface" }
"ui.selection.primary" = { bg = "selection" }

"ui.cursorline.primary" = { bg = "highlight_line" }
"ui.cursorline.secondary" = { bg = "surface" }

"warning" = "warning"
"error" = "error"
"info" = "accent_secondary"
"hint" = "accent_tertiary"
"debug" = "accent_primary"

"diagnostic" = { underline = { color = "subtle", style = "curl" } }
"diagnostic.hint" = { underline = { color = "accent_tertiary", style = "curl" } }
"diagnostic.info" = { underline = { color = "accent_secondary", style = "curl" } }
"diagnostic.warning" = { underline = { color = "warning", style = "curl" } }
"diagnostic.error" = { underline = { color = "error", style = "curl" } }
"special" = "accent_primary"

"attribute" = "accent_tertiary"
"type" = "accent_secondary"
"constructor" = "accent_secondary"

"constant" = "accent_secondary"
"constant.builtin" = "error"
"constant.builtin.boolean" = "accent_primary"
"constant.character" = "warning"
"constant.character.escape" = "accent_primary"
"constant.numeric" = "warning"

"string" = "warning"
"string.special.symbol" = "accent_tertiary"

"comment" = { fg = "muted", modifiers = ["italic"] }

"variable" = "foreground"
"variable.builtin" = "error"
"variable.parameter" = "accent_tertiary"
"variable.other.member" = "accent_secondary"

"label" = "accent_secondary"
"punctuation" = "subtle"
"keyword" = "accent_primary"
"keyword.operator" = "subtle"
"operator" = "subtle"

"function" = "accent_primary"
"function.builtin" = { fg = "accent_primary", modifiers = ["bold"] }

"tag" = "accent_secondary"
"namespace" = "foreground"

"markup.heading.marker" = "muted"
"markup.heading" = { fg = "accent_tertiary", modifiers = ["bold"] }
"markup.heading.1" = { fg = "accent_tertiary", modifiers = ["bold"] }
"markup.heading.2" = { fg = "accent_secondary", modifiers = ["bold"] }
"markup.heading.3" = { fg = "accent_primary", modifiers = ["bold"] }
"markup.heading.4" = { fg = "warning", modifiers = ["bold"] }
"markup.heading.5" = { fg = "accent_primary", modifiers = ["bold"] }
"markup.heading.6" = { fg = "accent_secondary", modifiers = ["bold"] }
"markup.list" = "muted"
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = "accent_tertiary"
"markup.link.url" = { fg = "accent_tertiary", underline = { color = "accent_tertiary", style = "line" } }
"markup.link.label" = "subtle"
"markup.link.text" = "accent_secondary"
"markup.quote" = "subtle"
"markup.raw" = "subtle"
"markup.raw.inline" = "warning"
"markup.raw.block" = "warning"

"diff" = "surface"
"diff.plus" = "accent_secondary"
"diff.minus" = "error"
"diff.delta" = "accent_primary"

[palette]
# --- Pure Structural Colors ---
background     = "{{colors.background.default.hex}}"
foreground     = "{{colors.on_background.default.hex}}"
surface        = "{{colors.surface_container.default.hex}}"
selection      = "{{colors.surface_container_highest.default.hex}}"
highlight_line = "{{colors.surface_container_low.default.hex}}"

# --- Scoped Context Text ---
subtle         = "{{colors.on_surface_variant.default.hex}}"
muted          = "{{colors.outline.default.hex}}"

# --- Semantic Code Accents ---
accent_primary   = "{{colors.primary.default.hex}}"
accent_secondary = "{{colors.secondary.default.hex}}"
accent_tertiary  = "{{colors.tertiary.default.hex}}"

# --- Alerts & Safety ---
warning        = "{{colors.error_container.default.hex}}" # Fallback container accent
error          = "{{colors.error.default.hex}}"

# --- Statusline Mode Containers ---
mode_normal    = "{{colors.surface_variant.default.hex}}"
mode_insert    = "{{colors.surface_container_high.default.hex}}"
mode_select    = "{{colors.surface_container_lowest.default.hex}}"
