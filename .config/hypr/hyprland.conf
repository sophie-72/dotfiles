# =============================================================================
# MONITORS
# =============================================================================
monitor = eDP-1, preferred, 1920x0, 1
monitor = HDMI-A-1, preferred, 0x0, 1

# =============================================================================
# AUTOSTART & ENVIRONMENT SETUP
# =============================================================================
# Critical: Sync environment so awww-daemon, mako, and quickshell don't crash
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = awww-daemon
exec-once = hypridle
exec-once = mako
exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie
exec-once = ~/.config/hypr/randomize-wallpaper.sh
exec-once = quickshell
exec-once = ~/.config/bluetooth-monitor.sh

# Color theme mapping
source = ~/.config/hypr/colors.conf

# Default Applications
$terminal = kitty
$menu = quickshell --path ~/.config/quickshell/appLauncher
$mainMod = SUPER

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

# =============================================================================
# INPUT & GESTURES
# =============================================================================
input {
    kb_layout = us,ca
    kb_options = grp:alt_shift_toggle
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        scroll_factor = 0.5
        tap-to-click = true
    }
    sensitivity = 0
}

gesture {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# =============================================================================
# LOOK & FEEL
# =============================================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3

    col.active_border = $primary $primary_container 45deg
    col.inactive_border = $surface_variant

    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    active_opacity = 0.9
    inactive_opacity = 0.9
    fullscreen_opacity = 1

    blur {
        enabled = true
        size = 8
        passes = 1
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $shadow
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# =============================================================================
# LAYOUTS & MISC
# =============================================================================
dwindle {
    preserve_split = yes 
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
}

# =============================================================================
# KEYBINDS
# =============================================================================
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, layoutmsg, togglesplit,

# Session Management
bind = $mainMod, L, exec, hyprlock # Manual screen locking

# Focus Utilities
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Windows to Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll/Mouse bindings
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Hardware Media Controls
bind = , xf86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , xf86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , xf86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Dynamic Screenshot to Clipboard
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
